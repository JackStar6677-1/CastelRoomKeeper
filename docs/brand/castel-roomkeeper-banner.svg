<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">CastelRoomKeeper</title>
  <desc id="desc">Banner del calendario privado de salas del Colegio Castelgandolfo.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf4fb"/>
      <stop offset="0.52" stop-color="#dbe8f4"/>
      <stop offset="1" stop-color="#f3f7ef"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c4c74"/>
      <stop offset="0.58" stop-color="#345f88"/>
      <stop offset="1" stop-color="#4e8452"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#173456" flood-opacity="0.18"/>
    </filter>
  </defs>

  <style>
    @keyframes pulseDot {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes slideBg {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .cal-dot-1 {
      animation: pulseDot 2.5s infinite ease-in-out;
      transform-origin: 43px 72px;
    }
    .cal-dot-2 {
      animation: pulseDot 2.5s infinite ease-in-out;
      animation-delay: 0.8s;
      transform-origin: 68px 72px;
    }
    .cal-dot-3 {
      animation: pulseDot 2.5s infinite ease-in-out;
      animation-delay: 1.6s;
      transform-origin: 93px 72px;
    }
    .cal-dot-4 {
      animation: pulseDot 2.5s infinite ease-in-out;
      animation-delay: 0.4s;
      transform-origin: 43px 96px;
    }
    .cal-dot-5 {
      animation: pulseDot 2.5s infinite ease-in-out;
      animation-delay: 1.2s;
      transform-origin: 68px 96px;
    }
    .badge-float-1 {
      animation: slideBg 4s infinite ease-in-out;
    }
    .badge-float-2 {
      animation: slideBg 4s infinite ease-in-out;
      animation-delay: 1s;
    }
    .badge-float-3 {
      animation: slideBg 4s infinite ease-in-out;
      animation-delay: 2s;
    }
    .badge-float-4 {
      animation: slideBg 4s infinite ease-in-out;
      animation-delay: 3s;
    }
  </style>

  <rect width="1280" height="360" rx="34" fill="url(#sky)"/>
  <path d="M0 270C146 224 257 228 376 258c148 38 232 67 397 31 150-33 259-103 507-75v146H0Z" fill="#cfdde9" opacity="0.82"/>
  <path d="M0 298c143-35 273-22 402 11 117 30 211 36 318 10 168-40 291-96 560-63v104H0Z" fill="#9fbf9a" opacity="0.56"/>
  <g transform="translate(82 58)" filter="url(#softShadow)">
    <rect width="1116" height="244" rx="26" fill="#ffffff"/>
    <rect width="392" height="244" rx="26" fill="url(#panel)"/>
    <path d="M392 0h40v244h-40z" fill="#ffffff" opacity="0.09"/>
    <g transform="translate(56 50)">
      <rect x="0" y="0" width="136" height="136" rx="28" fill="#ffffff" opacity="0.16"/>
      <rect x="22" y="30" width="92" height="78" rx="12" fill="#ffffff"/>
      <rect x="22" y="30" width="92" height="22" rx="10" fill="#dbe8f4"/>
      <circle cx="43" cy="72" r="7" fill="#2c4c74" class="cal-dot-1"/>
      <circle cx="68" cy="72" r="7" fill="#4e8452" class="cal-dot-2"/>
      <circle cx="93" cy="72" r="7" fill="#2c4c74" class="cal-dot-3"/>
      <circle cx="43" cy="96" r="7" fill="#4e8452" class="cal-dot-4"/>
      <circle cx="68" cy="96" r="7" fill="#2c4c74" class="cal-dot-5"/>
      <path d="M25 126c26-25 58-32 94-10" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.58"/>
    </g>
    <g transform="translate(452 52)">
      <text x="0" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#4e8452">COLEGIO CASTELGANDOLFO</text>
      <text x="0" y="90" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="850" fill="#20364f">CastelRoomKeeper</text>
      <text x="0" y="128" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="500" fill="#52677d">
        <tspan x="0" dy="0">Calendario privado para coordinar salas, reservas y avisos.</tspan>
        <tspan x="0" dy="30">Snapshot seguro del panel que vive bajo /admin/.</tspan>
      </text>
      <g transform="translate(0 184)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
        <g class="badge-float-1">
          <rect width="132" height="34" rx="17" fill="#e8f0f8"/>
          <text x="19" y="22" fill="#2c4c74">PHP Admin</text>
        </g>
        <g class="badge-float-2" transform="translate(148, 0)">
          <rect width="128" height="34" rx="17" fill="#edf5ec"/>
          <text x="21" y="22" fill="#4e8452">PWA / web</text>
        </g>
        <g class="badge-float-3" transform="translate(292, 0)">
          <rect width="154" height="34" rx="17" fill="#e8f0f8"/>
          <text x="22" y="22" fill="#2c4c74">JSON + MySQL</text>
        </g>
        <g class="badge-float-4" transform="translate(462, 0)">
          <rect width="126" height="34" rx="17" fill="#edf5ec"/>
          <text x="23" y="22" fill="#4e8452">SMTP</text>
        </g>
      </g>
    </g>
  </g>
</svg>
